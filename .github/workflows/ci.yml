name: CI — Backend

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────
  # JOB 1: Syntax Check + Smoke Test
  # ──────────────────────────────────────────────────
  lint:
    name: 🔍 Syntax & Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Node.js syntax check
        run: node --check src/server.js src/app.js

      - name: Run smoke tests
        run: npm test
        env:
          NODE_ENV: test

  # ──────────────────────────────────────────────────
  # JOB 2: Security Audit
  # ──────────────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high and critical)
        run: npm audit --audit-level=high

      - name: Detect hardcoded secrets in source
        run: |
          set -euo pipefail

          FOUND=$(grep -rn \
            -E "(JWT_SECRET|DATABASE_URL|DIRECT_URL|SMTP_PASS|GOOGLE_CLIENT_SECRET|MIDTRANS_SERVER_KEY)\s*=\s*['\"][^'\"\$\{]" \
            --include="*.js" --include="*.ts" \
            src/ 2>/dev/null || true)

          if [ -n "$FOUND" ]; then
            echo "::error::Hardcoded secret-style assignment detected in source:"
            echo "$FOUND"
            exit 1
          fi

          PATTERN_MATCHES=$(grep -RInE \
            "(AKIA[0-9A-Z]{16}|-----BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY-----|ghp_[A-Za-z0-9_]{36}|sk-[A-Za-z0-9]{20,})" \
            src prisma .github/docker/backend.Dockerfile package.json package-lock.json 2>/dev/null || true)

          if [ -n "$PATTERN_MATCHES" ]; then
            echo "::error::Potential leaked secret pattern detected:"
            echo "$PATTERN_MATCHES"
            exit 1
          fi

          echo "✅ No hardcoded secrets or common leaked secret patterns detected"

  # ──────────────────────────────────────────────────
  # JOB 3: Prisma Schema Validation
  # ──────────────────────────────────────────────────
  prisma-validate:
    name: 🗄️ Prisma Schema Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema syntax
        run: npx prisma validate --schema=prisma/schema.prisma
        env:
          # Prisma 7 membaca URL dari prisma.config.ts → butuh DIRECT_URL env
          # Dummy URL cukup untuk validasi sintaks (tidak konek ke database)
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci_dummy"

  # ──────────────────────────────────────────────────
  # JOB 4: Docker Build Check (bergantung job 1-3)
  # ──────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint, security, prisma-validate]
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (dry-run, tidak push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/docker/backend.Dockerfile
          push: false
          tags: nutrigrow-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
