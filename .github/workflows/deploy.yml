name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  validate:
    name: ✅ Pre-deploy validation
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Node.js syntax check
        run: node --check src/server.js src/app.js

      - name: Run smoke tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Validate Prisma schema syntax
        run: npx prisma validate --schema=prisma/schema.prisma
        env:
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci_dummy"

      - name: npm audit (high and critical)
        run: npm audit --audit-level=high

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (dry-run, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: nutrigrow-backend:deploy-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 🚀 Deploy backend to production VPS
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    timeout-minutes: 20

    steps:
      - name: Secret preflight
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          : "${VPS_HOST:?VPS_HOST secret is required}"
          : "${VPS_USERNAME:?VPS_USERNAME secret is required}"
          : "${VPS_SSH_KEY:?VPS_SSH_KEY secret is required}"
          : "${VPS_PORT:?VPS_PORT secret is required}"
          : "${BACKEND_HEALTHCHECK_URL:?BACKEND_HEALTHCHECK_URL secret is required}"
          echo "✅ Required backend deployment secrets are present"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            echo "📂 Navigating to backend directory..."
            cd /home/nutrigrow/backend
            echo "⬇️ Pulling latest main..."
            git pull origin main
            echo "🔄 Rebuilding and restarting backend container..."
            docker compose up -d --build
            echo "✅ Backend deployment command complete"
            docker compose ps

      - name: Health check
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          echo "⏳ Waiting 20 seconds for backend service to start..."
          sleep 20
          echo "🏥 Checking backend health at ${BACKEND_HEALTHCHECK_URL}"
          curl -fsS --max-time 15 "${BACKEND_HEALTHCHECK_URL}"
          echo "✅ Backend health check passed"
